<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CAPTAINCY BALLOT</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Space+Grotesk:wght@400;700&display=swap');

        :root {
            --bg: #fff0f5;
            --ink: #2b0016;
            --accent: #ff69b4;
            --line: #ffb6c1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--ink);
            font-family: 'Space Grotesk', sans-serif;
            padding: 2rem;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background-image: linear-gradient(var(--line) 1px, transparent 1px);
            background-size: 100% 3rem;
            line-height: 3rem;
        }

        header {
            margin-top: 1rem;
            border-bottom: 4px dashed var(--ink);
            padding-bottom: 2rem;
        }

        h1 {
            font-family: 'Caveat', cursive;
            font-size: clamp(3rem, 10vw, 7rem);
            line-height: 1;
            transform: rotate(-1deg);
            display: inline-block;
            color: var(--ink);
            text-shadow: 2px 2px var(--accent);
        }

        .meta {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 1rem;
        }

        main {
            display: grid;
            grid-template-columns: 1fr;
            gap: 3rem;
            margin: 5rem 0;
        }

        @media (min-width: 768px) {
            main {
                grid-template-columns: 1fr 1fr;
            }
        }

        .card {
            background: transparent;
            border: none;
            color: var(--ink);
            text-align: left;
            cursor: not-allowed;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            outline: none;
            padding: 1rem;
            opacity: 0.5;
        }

        .card.winner-card {
            opacity: 1;
        }

        .label {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            border-bottom: 2px dashed var(--line);
            padding-bottom: 0.5rem;
        }

        .name {
            font-family: 'Caveat', cursive;
            font-size: clamp(3.5rem, 8vw, 6rem);
            line-height: 0.9;
            margin-top: 2rem;
            margin-bottom: 2rem;
        }

        .winner-card .name::after {
            content: "✓ Winner";
            font-family: 'Caveat', cursive;
            font-size: 2rem;
            color: var(--accent);
            display: block;
            transform: rotate(-5deg);
        }

        .tally {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(5rem, 15vw, 11rem);
            font-weight: 700;
            line-height: 1;
        }

        footer {
            border-top: 4px dashed var(--ink);
            padding-top: 1.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
        }

        #msg {
            font-family: 'Caveat', cursive;
            font-size: 2rem;
            color: var(--accent);
            text-transform: none;
        }
    </style>
</head>
<body id="notebook">

    <header>
        <h1>Galactic CF Captain Election</h1>
        <div class="meta">
            Final Closed Tally
        </div>
    </header>

    <main id="board">
        <button class="card winner-card" id="m-diwash" disabled>
            <div>
                <div class="label">Option 01</div>
                <div class="name">Diwash Ale Magar</div>
            </div>
            <div class="tally" id="t-diwash">4</div>
        </button>

        <button class="card" id="m-ayush" disabled>
            <div>
                <div class="label">Option 02</div>
                <div class="name">Ayush Ranabat</div>
            </div>
            <div class="tally" id="t-ayush">3</div>
        </button>
    </main>

    <footer>
        <div>Status: <span id="msg">Voting over! Diwash wins by exactly 3 votes.</span></div>
    </footer>

</body>
</html>
